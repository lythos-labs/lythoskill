name: Bug Report
description: Report a problem in lythoskill
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected Package / Skill
      options:
        - "@lythos/skill-creator"
        - "@lythos/skill-deck"
        - "@lythos/skill-arena"
        - "@lythos/skill-curator"
        - "@lythos/project-cortex"
        - "@lythos/hello-world"
        - "@lythos/test-utils"
        - "Other / Unsure"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal commands or code to reproduce the issue.
      placeholder: |
        1. Run `bunx @lythos/skill-deck link`
        2. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
      placeholder: |
        Expected: symlinks created in .claude/skills/
        Actual: Error "budget exceeded"
  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      placeholder: "e.g. 1.3.11"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15, Ubuntu 24.04"
