name: Sync Skills Branch

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to skills branch (hexo-style deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA=$(git rev-parse --short HEAD)

          # Hexo-style: deploy content into isolated directory
          DEPLOY_DIR=".deploy"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # Copy only what belongs on the skills branch
          cp -r skills/* "$DEPLOY_DIR/"
          cp README.md "$DEPLOY_DIR/" 2>/dev/null || true

          cd "$DEPLOY_DIR"

          # Fresh git repo for the skills branch
          git init
          git checkout -b skills
          git add .
          git commit -m "chore: sync skills from main @ ${SHORT_SHA}" || echo "No changes to commit"

          # Push to skills branch
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
