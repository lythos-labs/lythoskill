name: Sync Skills Branch

on:
  push:
    branches: [main]
    paths:
      - 'packages/**/skill/**'
      - 'packages/**/package.json'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build skills
        run: |
          bun packages/lythoskill-creator/src/cli.ts build lythoskill-creator
          bun packages/lythoskill-creator/src/cli.ts build lythoskill-deck
          bun packages/lythoskill-creator/src/cli.ts build lythoskill-project-cortex
          bun packages/lythoskill-creator/src/cli.ts build lythoskill-hello-world

      - name: Sync to skills branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a temporary orphan branch
          git checkout --orphan skills-tmp
          git rm -rf .

          # Copy only skills directory contents to root
          cp -r skills/* .

          # Stage all
          git add .

          # Commit with reference to triggering commit
          git commit -m "chore: sync skills from main @ $(git rev-parse --short ${{ github.sha }})" || echo "No changes to commit"

          # Force push to skills branch
          git push -f origin skills-tmp:skills
