name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun packages/lythoskill-project-cortex/test/runner.ts
      - run: bun packages/lythoskill-creator/src/cli.ts align
