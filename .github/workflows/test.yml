name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: test-utils
        run: bun test packages/lythoskill-test-utils/src/*.test.ts
      - name: curator
        run: bun test packages/lythoskill-curator/src/curator-core.test.ts packages/lythoskill-curator/src/feed-adapters.test.ts packages/lythoskill-curator/src/cli.test.ts --if-present
        continue-on-error: true
      - name: cortex BDD
        run: bun packages/lythoskill-project-cortex/test/runner.ts
      - name: deck unit
        run: bun test packages/lythoskill-deck/src/
      - name: deck BDD
        # interim: deck BDD scenarios use bare-name fixtures (`skill-a` etc.)
        # which are now rejected by FQ-only locator policy (ADR-20260502012643244).
        # Migration plan: lythos-labs/test-stubs repo + scenarios use real FQ
        # locators (e.g., `github.com/lythos-labs/test-stubs/skill-a`).
        # Until that repo exists, BDD failures are surfaced but do not block.
        # Tracked in cortex task (search BDD-test-stubs).
        run: bun packages/lythoskill-deck/test/runner.ts
        continue-on-error: true
      - name: cold-pool unit
        run: bun test packages/lythoskill-cold-pool/src/
      - name: validate example decks
        run: bun scripts/validate-example-decks.ts
        continue-on-error: false
      - name: arena
        run: bun test packages/lythoskill-arena/src/
      - run: bun packages/lythoskill-creator/src/cli.ts align
      - name: test report
        if: always()
        run: bun scripts/test-report.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-results/

  coverage-deck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun test packages/lythoskill-deck/src/
      - run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage packages/lythoskill-deck/src/ || true
      - uses: 70-10/bun-coverage-report-action@v1.0.3
        if: github.event_name == 'pull_request'
        with:
          lcov-path: coverage/lcov.info
          min-coverage: 0

  coverage-test-utils:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun test packages/lythoskill-test-utils/src/bdd-runner.test.ts packages/lythoskill-test-utils/src/agent-bdd.test.ts packages/lythoskill-test-utils/src/judge.test.ts packages/lythoskill-test-utils/src/agents-claude.test.ts || true
      - run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage-test-utils packages/lythoskill-test-utils/src/bdd-runner.test.ts packages/lythoskill-test-utils/src/agent-bdd.test.ts packages/lythoskill-test-utils/src/judge.test.ts packages/lythoskill-test-utils/src/agents-claude.test.ts || true
      - uses: 70-10/bun-coverage-report-action@v1.0.3
        if: github.event_name == 'pull_request'
        with:
          lcov-path: coverage-test-utils/lcov.info
          min-coverage: 0
