name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: test-utils
        run: sh -c "cd packages/lythoskill-test-utils && bun test"
      - name: agent-adapter
        run: sh -c "cd packages/lythoskill-agent-adapter && bun test"
      - name: agent-adapter-claude-sdk
        run: sh -c "cd packages/lythoskill-agent-adapter-claude-sdk && bun test"
      - name: curator
        run: sh -c "cd packages/lythoskill-curator && bun test"
      - name: cold-pool
        run: sh -c "cd packages/lythoskill-cold-pool && bun test"
      - name: cortex BDD
        run: bun packages/lythoskill-project-cortex/test/runner.ts
      - name: deck unit
        run: sh -c "cd packages/lythoskill-deck && bun test"
      - name: deck BDD
        run: bun packages/lythoskill-deck/test/runner.ts
      - name: arena
        run: sh -c "cd packages/lythoskill-arena && bun test"
      - name: validate example decks
        run: bun scripts/validate-example-decks.ts
      - run: bun packages/lythoskill-creator/src/cli.ts align
      - name: test report
        if: always()
        run: bun scripts/test-report.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-results/

  coverage-deck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: sh -c "cd packages/lythoskill-deck && bun test"
      - run: sh -c "cd packages/lythoskill-deck && bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage" || true
      - uses: 70-10/bun-coverage-report-action@v1.0.3
        if: github.event_name == 'pull_request'
        with:
          lcov-path: packages/lythoskill-deck/coverage/lcov.info
          min-coverage: 0

  coverage-cold-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: sh -c "cd packages/lythoskill-cold-pool && bun test"
      - run: sh -c "cd packages/lythoskill-cold-pool && bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage" || true
      - uses: 70-10/bun-coverage-report-action@v1.0.3
        if: github.event_name == 'pull_request'
        with:
          lcov-path: packages/lythoskill-cold-pool/coverage/lcov.info
          min-coverage: 0

  coverage-test-utils:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: sh -c "cd packages/lythoskill-test-utils && bun test"
      - run: sh -c "cd packages/lythoskill-test-utils && bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage" || true
      - uses: 70-10/bun-coverage-report-action@v1.0.3
        if: github.event_name == 'pull_request'
        with:
          lcov-path: packages/lythoskill-test-utils/coverage/lcov.info
          min-coverage: 0
